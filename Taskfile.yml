version: '3'

vars:
  DATABASE_URL: '{{default "postgres://edda:edda@localhost:5434/edda?sslmode=disable" .DATABASE_URL}}'
  APP_LOG_FILE: '{{default ".logs/tui.log" .APP_LOG_FILE}}'


tasks:
  db:up:
    desc: Start Postgres and run migrations
    cmds:
      - docker start edda-postgres || docker compose up -d postgres
      - task migrate
    env:
      DATABASE_URL: '{{.DATABASE_URL}}'

  dev:server:
    desc: Start the API backend server
    deps: [db:up]
    cmds:
      - set -a && . ./.env && set +a && go run ./cmd/server

  dev:web:
    desc: Start the API server and Vite frontend dev server
    deps: [db:up]
    cmds:
      - set -a && . ./.env && set +a && go run ./cmd/server &
      - pnpm --dir frontend dev

  dev:tui:
    desc: Start the TUI
    deps: [db:up]
    cmds:
      - set -a && . ./.env && set +a && go run ./cmd/tui

  dev:tui:app-logs:
    desc: Start the TUI with app stderr captured to a log file
    deps: [db:up]
    cmds:
      - mkdir -p .logs
      - rm -f '{{.APP_LOG_FILE}}' && touch '{{.APP_LOG_FILE}}'
      - set -a && . ./.env && set +a && go run ./cmd/tui 2>> '{{.APP_LOG_FILE}}'

  dev:tui:debug:
    desc: Launch the TUI in debug mode with alt-screen disabled and combined output mirrored to a file
    deps: [db:up]
    cmds:
      - mkdir -p .logs
      - rm -f .logs/tui.debug.log && touch .logs/tui.debug.log
      - set -a && . ./.env && set +a && EDDA_TUI_ALTSCREEN=0 EDDA_TUI_MOUSE=0 sh -c 'go run ./cmd/tui 2>&1 | tee -a .logs/tui.debug.log'

  logs:debug:
    desc: Tail combined debug TUI output
    cmds:
      - mkdir -p .logs && touch .logs/tui.debug.log
      - tail -f .logs/tui.debug.log

  logs:app:
    desc: Tail captured TUI app logs
    cmds:
      - mkdir -p .logs && touch '{{.APP_LOG_FILE}}'
      - tail -f '{{.APP_LOG_FILE}}'

  logs:postgres:
    desc: Stream local Postgres logs for debugging
    cmds:
      - docker logs -f edda-postgres

  logs:ollama:
    desc: Stream Ollama logs from Docker if present, else from the system service
    cmds:
      - |
        if docker ps -a --format '{{.Names}}' | grep -qx 'edda-ollama'; then
          docker logs -f edda-ollama
        elif systemctl is-active --quiet ollama; then
          journalctl -fu ollama
        else
          echo 'No edda-ollama container or active system ollama service found.' >&2
          exit 1
        fi

  logs:stream:
    desc: Stream structured game logs with colors and `-service world,ollama` filtering
    cmds:
      - go run ./cmd/logs -history 20 {{.CLI_ARGS}}

  logs:clean:
    desc: Remove all structured log files
    cmds:
      - rm -f .logs/edda.jsonl

  reset:first-boot:
    desc: Reset local Postgres data to first-boot state (destroys local game data)
    cmds:
      - docker rm -f edda-postgres || true
      - docker volume rm edda_postgres_data || true
      - docker compose up -d postgres
      - task migrate

  migrate:
    desc: Run goose migrations against the configured database
    cmds:
      - go run github.com/pressly/goose/v3/cmd/goose@v3.24.1 -dir ./migrations postgres '{{.DATABASE_URL}}' up

  migrate:create:
    desc: Create a new goose migration file
    cmds:
      - go run github.com/pressly/goose/v3/cmd/goose@v3.24.1 -dir ./migrations create {{.CLI_ARGS}} sql

  generate:
    desc: Generate type-safe database code with sqlc
    cmds:
      - go run github.com/sqlc-dev/sqlc/cmd/sqlc@v1.29.0 generate

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:unit:
    desc: Run unit tests only (exclude integration)
    cmds:
      - go test -short ./...

  test:integration:
    desc: Run integration tests only
    cmds:
      - go test -tags integration -run Integration ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  build:
    desc: Build the server and TUI binaries
    cmds:
      - mkdir -p ./bin
      - go build -o ./bin/tui ./cmd/tui
      - go build -o ./bin/server ./cmd/server
      - go build -o ./bin/logs ./cmd/logs

  build:server:
    desc: Rebuild and restart the API server
    cmds:
      - mkdir -p ./bin
      - go build -o ./bin/server ./cmd/server
      - set -a && . ./.env && set +a && ./bin/server

  frontend:dev:
    desc: Start the Vite frontend dev server
    cmds:
      - pnpm --dir frontend dev

  frontend:build:
    desc: Build the Vite frontend
    cmds:
      - pnpm --dir frontend build

  frontend:lint:
    desc: Lint the frontend
    cmds:
      - pnpm --dir frontend lint

  frontend:typecheck:
    desc: Type-check the frontend without emitting output
    cmds:
      - pnpm --dir frontend exec tsc --noEmit
