services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: edda-postgres
    environment:
      POSTGRES_DB: edda
      POSTGRES_USER: edda
      POSTGRES_PASSWORD: edda
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edda -d edda"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
